
[variables]
NIXPACKS_PYTHON_VERSION = "3.13"

[phases.setup]
packages = ["postgresql", "noto-fonts-cjk-sans", "fontconfig"]


[phases.install]
commands = [
  "python -m pip install --upgrade pip",
  "pip install --no-cache-dir -r requirements.txt"
]

[phases.start]
start = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8080}"
